<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
  content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Darts 301 / 501 / 701 / 1101 / 1501</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180-landscape.png">

<style>
:root{
  --bg0:#070a10; --bg1:#0c1220;
  --txt:#e6edf3; --muted:#9aa7b6;
  --blue:#1f6feb; --green:#238636; --red:#c2463a;
  --gold:#ffd700;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;
  margin:0;
  overscroll-behavior:none;
  -webkit-text-size-adjust:100%;
  overflow:hidden;
}
body{
  background:
    radial-gradient(900px 600px at 20% 10%, rgba(88,166,255,.18), transparent 60%),
    linear-gradient(180deg,var(--bg0),var(--bg1));
  color:var(--txt);
  font-family:system-ui,-apple-system,sans-serif;
  padding:20px;
  user-select:none;
  -webkit-user-select:none;
  touch-action:manipulation;
  display:flex;
  align-items:center;
  justify-content:center;
}

.app{
  width:100%;
  max-width:1400px;
  height:100%;
  max-height:900px;
  display:grid;
  grid-template-columns:1fr 1.5fr;
  gap:24px;
}

/* ===== LEFT ===== */
.left{
  display:flex;
  flex-direction:column;
  gap:16px;
  height:100%;
}

.gameRow, .modeRow{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.gameRow button, .modeRow button{
  padding:13px 18px;
  border-radius:999px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
  color:#fff;
  transition:all .2s;
  font-size:1rem;
}
.gameRow button:active, .modeRow button:active{transform:scale(.95);}
.gameRow button.on, .modeRow button.on{background:rgba(31,111,235,.35);}
.modeRow .reset{background:rgba(194,70,58,.35);}

/* ラウンド表示ボックス */
.roundBox{
  padding:18px 22px;
  border-radius:20px;
  background:linear-gradient(135deg,rgba(31,111,235,.25),rgba(88,166,255,.12));
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.roundBox .gameNum{
  font-size:3rem;
  font-weight:1000;
  line-height:1;
  letter-spacing:-.02em;
}
.roundBox .roundInfo{
  text-align:right;
}
.roundBox .roundLabel{
  font-size:.85rem;
  font-weight:900;
  letter-spacing:.25em;
  opacity:.7;
  margin-bottom:4px;
}
.roundBox .roundNum{
  font-size:2.6rem;
  font-weight:1000;
  line-height:1;
}
.roundBox .roundNum.warn  { color:#ff9800; }
.roundBox .roundNum.danger{ color:#f44336; }

.scoreRow{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  flex:1;
  min-height:0;
}
.scoreCard{
  padding:20px 18px;
  border-radius:24px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  transition:all .3s;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:1rem;
  font-weight:700;
}
.scoreCard.active{
  outline:3px solid rgba(88,166,255,.6);
  background:rgba(31,111,235,.12);
}
.score{
  font-size:5rem;
  font-weight:1000;
  line-height:1;
  margin:14px 0 8px;
}
.score.sm{ font-size:3.6rem; }
.high{
  font-size:.85rem;
  color:var(--gold);
  margin-top:2px;
  font-weight:600;
}
.checkout{
  font-size:.8rem;
  color:#58a6ff;
  margin-top:4px;
  font-weight:700;
  min-height:1.2em;
  letter-spacing:.03em;
  text-align:center;
  line-height:1.4;
}

.scoreCard.winner{
  border:2px solid var(--gold);
  box-shadow:
    0 0 20px rgba(255,215,0,.85),
    0 0 40px rgba(255,215,0,.65),
    0 0 80px rgba(255,215,0,.45);
  animation:winnerPulse 1.6s ease-in-out infinite;
}
@keyframes winnerPulse{
  0%{box-shadow:0 0 18px rgba(255,215,0,.6)}
  50%{box-shadow:0 0 45px rgba(255,215,0,1)}
  100%{box-shadow:0 0 18px rgba(255,215,0,.6)}
}

.scoreCard.bust{
  outline:3px solid rgba(194,70,58,.85);
  background:rgba(194,70,58,.12);
  animation:bustShake .35s ease-in-out 0s 2;
}
@keyframes bustShake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}

/* ===== RIGHT ===== */
.right{
  display:grid;
  grid-template-rows:auto 1fr auto auto;
  gap:18px;
  height:100%;
}

.turnBox{
  display:flex;
  justify-content:space-between;
  padding:16px 24px;
  border-radius:20px;
  background:rgba(0,0,0,.25);
  font-weight:700;
  font-size:1.1rem;
}

.numGrid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  align-content:start;
}
.numGrid button{
  padding:24px 0;
  border-radius:20px;
  font-size:1.6rem;
  font-weight:1000;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  transition:all .15s;
  min-height:70px;
}
.numGrid button:active{
  transform:scale(.92);
  background:rgba(255,255,255,.18);
}
.numGrid .bull{background:rgba(210,153,34,.45);}
.numGrid .miss{background:rgba(48,54,61,.6);}

.multi{ display:flex; gap:14px; }
.multi button{
  flex:1;
  padding:22px 18px;
  border-radius:999px;
  font-weight:1000;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);
  color:#fff;
  transition:all .2s;
  font-size:1.1rem;
  min-height:70px;
}
.multi button:active{transform:scale(.95);}
#sBtn{ background:rgba(35,134,54,.22); border-color:rgba(35,134,54,.35); }
#dBtn{ background:rgba(31,111,235,.22); border-color:rgba(31,111,235,.35); }
#tBtn{ background:rgba(194,70,58,.22); border-color:rgba(194,70,58,.35); }
#sBtn.on{ background:var(--green); border-color:var(--green); box-shadow:0 0 16px rgba(35,134,54,.6); }
#dBtn.on{ background:var(--blue);  border-color:var(--blue);  box-shadow:0 0 16px rgba(31,111,235,.6); }
#tBtn.on{ background:var(--red);   border-color:var(--red);   box-shadow:0 0 16px rgba(194,70,58,.6); }

.actions{
  display:flex;
  gap:16px;
  justify-content:center;
}
.actions button{
  padding:26px 40px;
  border-radius:999px;
  font-weight:900;
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  min-width:240px;
  min-height:80px;
  font-size:1.3rem;
  transition:all .2s;
}
.actions button:active:not(:disabled){transform:scale(.96);}
.actions .cancel{ background:rgba(255,255,255,.18); }
.actions .next  { background:rgba(31,111,235,.35); }
button:disabled{ opacity:.45; cursor:not-allowed; }

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.85);
  z-index:9999;
}
.overlay.on{display:flex;}
.overlayCard{
  padding:48px 60px;
  border-radius:32px;
  background:linear-gradient(135deg,#ffd700,#ff00d4);
  animation:pop .5s ease-out;
  text-align:center;
}
.overlayCard.bust   {background:linear-gradient(135deg,#ff3b30,#c2006b);}
.overlayCard.timeout{background:linear-gradient(135deg,#ff6f00,#b00020);}
@keyframes pop{
  from{transform:scale(.3);opacity:0}
  to  {transform:scale(1);opacity:1}
}
.overlayCard .main{
  font-size:4.5rem;
  font-weight:1000;
  color:#fff;
  text-shadow:3px 3px 10px rgba(0,0,0,.5);
}
.overlayCard .sub{
  font-size:1.6rem;
  font-weight:700;
  color:rgba(255,255,255,.9);
  margin-top:10px;
}

/* タブレット小画面 */
@media (max-height:750px){
  .app{gap:14px;}
  .left{gap:12px;}
  .roundBox{padding:14px 18px;}
  .roundBox .gameNum{font-size:2.4rem;}
  .roundBox .roundNum{font-size:2.1rem;}
  .scoreCard{padding:16px 14px;}
  .score{font-size:4rem; margin:10px 0 6px;}
  .score.sm{font-size:3rem;}
  .numGrid button{padding:18px 0; font-size:1.4rem; min-height:58px;}
  .multi button{padding:18px 14px; min-height:58px;}
  .actions button{padding:20px 30px; min-height:66px; font-size:1.15rem;}
  .overlayCard .main{font-size:3.8rem;}
  .overlayCard .sub{font-size:1.4rem;}
}

/* 縦向き/小画面 */
@media (max-width:750px) or (orientation: portrait){
  body::before{
    content:"このアプリはタブレットを横向きにしてご使用ください";
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg0);
    color:var(--txt);
    font-size:1.5rem;
    font-weight:700;
    text-align:center;
    padding:40px;
    z-index:10000;
  }
  .app{display:none;}
}
</style>

</head>

<script>
(() => {
  // ===== GAME CONFIG =====
  // maxRounds: null = 制限なし / 数値 = 上限ラウンド
  const GAMES = {
    301:  { start:  301, maxRounds: null },
    501:  { start:  501, maxRounds: null },
    701:  { start:  701, maxRounds: 15   },
    1101: { start: 1101, maxRounds: 20   },
    1501: { start: 1501, maxRounds: 20   },
  };

  const BULL_VALUE = 50;

  // ===== STATE =====
  let startScore   = 301;
  let maxRounds    = null;

  let mode         = 1;
  let player       = 0;
  let scores       = [startScore, startScore];
  let bestRemain   = [startScore, startScore];
  let currentRound = 1;

  let throwN       = 1;
  let turn         = [null, null, null];
  let pendingBase  = null;
  let locked       = false;
  let snapshot     = null;

  let turnSum      = 0;
  let turnBull     = false;
  let turnLowTon   = false;
  let bustThisTurn = false;

  let turnStartScores = [startScore, startScore];
  let finished = false;

  const el = id => document.getElementById(id);

  // ===== CHECKOUT HINT（整数のみ・小数なし） =====
  function allScoreValues() {
    const s = new Set();
    for (let i = 1; i <= 20; i++) { s.add(i); s.add(i*2); s.add(i*3); }
    s.add(BULL_VALUE);
    return [...s].sort((a,b) => a-b);
  }

  function scoreLabel(val) {
    if (val === BULL_VALUE) return 'BULL';
    if (val > 20 && val % 3 === 0 && val/3 <= 20) return `T${val/3}`;
    if (val > 20 && val % 2 === 0 && val/2 <= 20) return `D${val/2}`;
    return `${val}`;
  }

  function checkoutIn1(r) {
    if (r < 1 || r > 60) return null;
    if (r <= 20) return `${r}`;
    if (r % 2 === 0 && r/2 <= 20) return `D${r/2}`;
    if (r % 3 === 0 && r/3 <= 20) return `T${r/3}`;
    if (r === 50) return `BULL`;
    return null;
  }

  function checkoutIn2(r) {
    if (r < 2 || r > 110) return null;
    for (const a of allScoreValues()) {
      const b = r - a;
      if (b < 1) continue;
      const fin = checkoutIn1(b);
      if (fin) return `${scoreLabel(a)} → ${fin}`;
    }
    return null;
  }

  function checkoutIn3(r) {
    if (r < 3 || r > 170) return null;
    for (const a of allScoreValues()) {
      const rest = r - a;
      if (rest < 2) continue;
      const r2 = checkoutIn2(rest);
      if (r2) return `${scoreLabel(a)} → ${r2}`;
    }
    return null;
  }

  function getCheckoutHint(remain) {
    if (remain <= 0 || remain > 170) return '';
    const r1 = checkoutIn1(remain); if (r1) return `🎯 ${r1}`;
    const r2 = checkoutIn2(remain); if (r2) return `🎯 ${r2}`;
    const r3 = checkoutIn3(remain); if (r3) return `🎯 ${r3}`;
    return '';
  }
  // ===== END CHECKOUT HINT =====

  function showOverlay(main, sub='', kind='normal'){
    el("ovMain").textContent = main;
    el("ovSub").textContent  = sub;
    el("overlayCard").className = 'overlayCard' + (kind !== 'normal' ? ` ${kind}` : '');
    el("overlay").classList.add("on");
    setTimeout(() => el("overlay").classList.remove("on"), 3000);
  }

  function clearWinnerGlow(){
    el("p1Card").classList.remove("winner");
    el("p2Card").classList.remove("winner");
  }
  function clearBustGlow(){
    el("p1Card").classList.remove("bust");
    el("p2Card").classList.remove("bust");
  }

  function takeSnapshotIfNeeded(){
    if (!snapshot){
      snapshot = {
        scores:[...scores], bestRemain:[...bestRemain],
        player, throwN, turn:[...turn], pendingBase, locked,
        turnSum, turnBull, turnLowTon, bustThisTurn, finished,
        turnStartScores:[...turnStartScores],
        startScore, maxRounds, mode, currentRound
      };
    }
  }

  function restoreTurn(){
    if(!snapshot) return;
    scores          = [...snapshot.scores];
    bestRemain      = [...snapshot.bestRemain];
    player          = snapshot.player;
    throwN          = snapshot.throwN;
    turn            = [...snapshot.turn];
    pendingBase     = null;
    locked          = snapshot.locked;
    turnSum         = snapshot.turnSum;
    turnBull        = snapshot.turnBull;
    turnLowTon      = snapshot.turnLowTon;
    bustThisTurn    = snapshot.bustThisTurn;
    finished        = snapshot.finished;
    turnStartScores = [...snapshot.turnStartScores];
    startScore      = snapshot.startScore;
    maxRounds       = snapshot.maxRounds;
    mode            = snapshot.mode;
    currentRound    = snapshot.currentRound;
    snapshot = null;
    el("cancelBtn").disabled  = true;
    el("nextBtn").disabled    = true;
    el("nextBtn").textContent = "NEXT";
    clearWinnerGlow(); clearBustGlow();
    setMultiUI("sBtn");
    update();
  }

  function setTurnStartSnapshot(){ turnStartScores = [...scores]; }

  function setMultiUI(onId){
    ["sBtn","dBtn","tBtn"].forEach(id => el(id).classList.toggle("on", id===onId));
  }

  // ラウンド上限 → 残り少ない方が勝ち
  function roundLimitEnd(){
    finished = true;
    clearWinnerGlow(); clearBustGlow();

    if(mode === 2){
      if(scores[0] < scores[1]){
        el("p1Card").classList.add("winner");
        showOverlay("PLAYER 1 WIN!", `REMAIN  ${scores[0]} vs ${scores[1]}`, "timeout");
      } else if(scores[1] < scores[0]){
        el("p2Card").classList.add("winner");
        showOverlay("PLAYER 2 WIN!", `REMAIN  ${scores[1]} vs ${scores[0]}`, "timeout");
      } else {
        el("p1Card").classList.add("winner");
        el("p2Card").classList.add("winner");
        showOverlay("DRAW!", `REMAIN  ${scores[0]} vs ${scores[1]}`, "timeout");
      }
    } else {
      el("p1Card").classList.add("winner");
      showOverlay("TIME OUT!", `REMAIN : ${scores[0]}`, "timeout");
    }

    el("nextBtn").disabled    = false;
    el("nextBtn").textContent = "NEXT GAME";
    el("cancelBtn").disabled  = true;
  }

  function finishGame(){
    finished = true;
    clearWinnerGlow(); clearBustGlow();

    if(mode === 2){
      const winner = player;
      el(winner===0 ? "p1Card" : "p2Card").classList.add("winner");
      showOverlay(`PLAYER ${winner+1} WINNER!`);
    } else {
      el("p1Card").classList.add("winner");
      showOverlay("FINISH!");
    }

    el("nextBtn").disabled    = false;
    el("nextBtn").textContent = "NEXT GAME";
    el("cancelBtn").disabled  = true;
  }

  function startNextGame(){
    const cfg = GAMES[startScore];
    maxRounds = cfg ? cfg.maxRounds : null;

    scores       = [startScore, startScore];
    bestRemain   = [startScore, startScore];
    player       = 0;
    throwN       = 1;
    turn         = [null,null,null];
    pendingBase  = null;
    locked       = false;
    snapshot     = null;
    turnSum      = 0;
    turnBull     = false;
    turnLowTon   = false;
    bustThisTurn = false;
    finished     = false;
    currentRound = 1;

    clearWinnerGlow(); clearBustGlow();
    setTurnStartSnapshot();

    el("nextBtn").textContent = "NEXT";
    el("nextBtn").disabled    = true;
    el("cancelBtn").disabled  = true;
    setMultiUI("sBtn");
    update();
  }

  function endTurn(auto=false){
    if(finished){ startNextGame(); return; }
    if(!locked && !auto) return;

    if(!bustThisTurn){
      if(turnLowTon) showOverlay("LOW TON!!");
      else if(turnBull) showOverlay("Nice One!!");
    }

    snapshot     = null;
    pendingBase  = null;
    locked       = false;
    throwN       = 1;
    turn         = [null,null,null];
    turnSum      = 0;
    turnBull     = false;
    turnLowTon   = false;
    bustThisTurn = false;
    clearBustGlow();

    el("cancelBtn").disabled = true;
    el("nextBtn").disabled   = true;

    // ラウンド加算
    // 1P: 毎ターン終了で+1
    // 2P: player1(後攻)が終わった時点で+1（両者完了）
    let roundComplete = false;
    if(mode === 1){
      currentRound++;
      roundComplete = true;
    } else {
      if(player === 1){ currentRound++; roundComplete = true; }
      player ^= 1;
    }

    // 上限チェック（ラウンド完了した直後のみ）
    if(roundComplete && maxRounds !== null && currentRound > maxRounds){
      setTurnStartSnapshot();
      setMultiUI("sBtn");
      update();
      roundLimitEnd();
      return;
    }

    setTurnStartSnapshot();
    setMultiUI("sBtn");
    update();
  }

  function nextTurn(){ endTurn(false); }

  function bustNow(){
    scores[player] = turnStartScores[player];
    bustThisTurn   = true;
    clearBustGlow();
    el(player===0 ? "p1Card" : "p2Card").classList.add("bust");
    showOverlay(`BUST!!  PLAYER ${player+1}`, '', "bust");
    locked      = true;
    pendingBase = null;
    turn        = ["BUST", null, null];
    throwN      = 4;
    el("cancelBtn").disabled = true;
    el("nextBtn").disabled   = true;
    update();
    setTimeout(() => { if(!finished){ endTurn(true); } }, 900);
  }

  function applyScore(val){
    const nextRemain = scores[player] - val;
    if(nextRemain < 0){ bustNow(); return; }

    scores[player]     = nextRemain;
    bestRemain[player] = Math.min(bestRemain[player], scores[player]);
    turn[throwN-1]     = val;
    throwN++;

    turnSum += val;
    if(val === BULL_VALUE) turnBull = true;
    if(turnSum > 100) turnLowTon = true;

    pendingBase = null;
    el("cancelBtn").disabled = false;

    if(scores[player] === 0){
      locked = true;
      el("nextBtn").disabled = false;
      update();
      finishGame();
      return;
    }
    if(throwN > 3){
      locked = true;
      el("nextBtn").disabled = false;
    }
    setMultiUI("sBtn");
    update();
  }

  function pickNumber(base, kind){
    if(finished) return;
    if(locked)   return;
    takeSnapshotIfNeeded();
    if(kind==="BULL"){ applyScore(BULL_VALUE); return; }
    if(kind==="MISS"){ applyScore(0); return; }
    pendingBase = base;
    el("cancelBtn").disabled = false;
  }

  function applyMultiplier(m){
    if(finished) return;
    if(locked)   return;
    if(pendingBase == null) return;
    applyScore(pendingBase * m);
  }

  function setMode(m){
    mode = m; player = 0;
    clearWinnerGlow(); clearBustGlow();
    startNextGame();
  }

  function setGame(score){
    startScore = score;
    el("gameLabel").textContent = String(score);
    Object.keys(GAMES).forEach(k => {
      const b = el(`game${k}`);
      if(b) b.classList.toggle("on", Number(k)===score);
    });
    startNextGame();
  }

  function formatTurnCell(v){
    if(v==="BUST") return "BUST";
    return (v ?? "—");
  }

  function update(){
    el("p1Score").textContent = scores[0];
    el("p2Score").textContent = scores[1];

    // 4桁スコアは文字サイズ縮小
    el("p1Score").className = "score" + (scores[0] >= 1000 ? " sm" : "");
    el("p2Score").className = "score" + (scores[1] >= 1000 ? " sm" : "");

    el("p1High").textContent = `BEST REMAIN : ${bestRemain[0]}`;
    el("p2High").textContent = `BEST REMAIN : ${bestRemain[1]}`;
    el("hist").textContent   = turn.map(formatTurnCell).join("  ");

    el("p1Card").classList.toggle("active", player===0);
    el("p2Card").classList.toggle("active", player===1 && mode===2);
    el("mode1").classList.toggle("on", mode===1);
    el("mode2").classList.toggle("on", mode===2);

    // チェックアウトヒント（整数のみ）
    el("p1Checkout").textContent = getCheckoutHint(scores[0]);
    el("p2Checkout").textContent = getCheckoutHint(scores[1]);

    // ラウンド表示
    const rdEl = el("roundDisplay");
    if(maxRounds === null){
      rdEl.textContent = `${currentRound}`;
      rdEl.className   = "roundNum";
    } else {
      const remain = maxRounds - currentRound + 1;
      rdEl.textContent = `${currentRound} / ${maxRounds}`;
      rdEl.className   = "roundNum" +
        (remain <= 3 ? " danger" : remain <= 6 ? " warn" : "");
    }
  }

  // ===== BUILD NUMBER GRID =====
  const g = el("numGrid");
  for(let i=1; i<=20; i++){
    const b = document.createElement("button");
    b.type="button"; b.textContent=i;
    b.onclick = () => pickNumber(i, "NUM");
    g.appendChild(b);
  }
  const miss = document.createElement("button");
  miss.type="button"; miss.textContent="MISS"; miss.className="miss";
  miss.onclick = () => pickNumber(0, "MISS");
  g.appendChild(miss);

  const bull = document.createElement("button");
  bull.type="button"; bull.textContent="BULL"; bull.className="bull";
  bull.onclick = () => pickNumber(BULL_VALUE, "BULL");
  g.appendChild(bull);

  // ===== WIRE =====
  el("sBtn").onclick = () => { setMultiUI("sBtn"); applyMultiplier(1); };
  el("dBtn").onclick = () => { setMultiUI("dBtn"); applyMultiplier(2); };
  el("tBtn").onclick = () => { setMultiUI("tBtn"); applyMultiplier(3); };

  el("cancelBtn").onclick = restoreTurn;
  el("nextBtn").onclick   = nextTurn;
  el("mode1").onclick = () => setMode(1);
  el("mode2").onclick = () => setMode(2);

  Object.keys(GAMES).forEach(k => {
    const b = el(`game${k}`);
    if(b) b.onclick = () => setGame(Number(k));
  });

  el("reset").onclick = () => location.reload();

  // ===== INIT =====
  setGame(301);
  setMultiUI("sBtn");
})();
</script>

</body>
</html>
