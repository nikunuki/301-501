<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport"
  content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Darts 301 / 501 / 701 / 1101 / 1501</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180-landscape.png">

<style>
:root{
  --bg0:#070a10; --bg1:#0c1220;
  --txt:#e6edf3;
  --blue:#1f6feb; --green:#238636; --red:#c2463a;
  --gold:#ffd700;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%; margin:0;
  overscroll-behavior:none;
  -webkit-text-size-adjust:100%;
  overflow:hidden;
}
body{
  background:
    radial-gradient(900px 600px at 20% 10%, rgba(88,166,255,.18), transparent 60%),
    linear-gradient(180deg,var(--bg0),var(--bg1));
  color:var(--txt);
  font-family:system-ui,-apple-system,sans-serif;
  padding:20px;
  user-select:none; -webkit-user-select:none;
  touch-action:manipulation;
  display:flex; align-items:center; justify-content:center;
}

.app{
  width:100%; max-width:1400px;
  height:100%; max-height:900px;
  display:grid;
  grid-template-columns:1fr 1.5fr;
  gap:24px;
}

/* LEFT */
.left{ display:flex; flex-direction:column; gap:16px; height:100%; }

.gameRow,.modeRow{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.gameRow button,.modeRow button{
  padding:13px 18px; border-radius:999px;
  font-weight:900; border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08); color:#fff;
  transition:all .2s; font-size:1rem;
}
.gameRow button:active,.modeRow button:active{transform:scale(.95);}
.gameRow button.on,.modeRow button.on{background:rgba(31,111,235,.35);}
.modeRow .reset{background:rgba(194,70,58,.35);}

.roundBox{
  padding:18px 22px; border-radius:20px;
  background:linear-gradient(135deg,rgba(31,111,235,.25),rgba(88,166,255,.12));
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.roundBox .gameNum{ font-size:3rem; font-weight:1000; line-height:1; letter-spacing:-.02em; }
.roundBox .roundInfo{ text-align:right; }
.roundBox .roundLabel{ font-size:.85rem; font-weight:900; letter-spacing:.25em; opacity:.7; margin-bottom:4px; }
.roundBox .roundNum{ font-size:2.6rem; font-weight:1000; line-height:1; }
.roundBox .roundNum.warn  { color:#ff9800; }
.roundBox .roundNum.danger{ color:#f44336; }

.scoreRow{
  display:grid; grid-template-columns:1fr 1fr;
  gap:16px; flex:1; min-height:0;
}
.scoreCard{
  padding:20px 18px; border-radius:24px;
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
  transition:all .3s;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  font-size:1rem; font-weight:700;
}
.scoreCard.active{ outline:3px solid rgba(88,166,255,.6); background:rgba(31,111,235,.12); }
.score{ font-size:5rem; font-weight:1000; line-height:1; margin:14px 0 8px; }
.score.sm{ font-size:3.6rem; }
.high{ font-size:.85rem; color:var(--gold); margin-top:2px; font-weight:600; }
.checkout{ font-size:.8rem; color:#58a6ff; margin-top:4px; font-weight:700; min-height:1.2em; text-align:center; line-height:1.4; }

.scoreCard.winner{
  border:2px solid var(--gold);
  box-shadow:0 0 20px rgba(255,215,0,.85),0 0 40px rgba(255,215,0,.65),0 0 80px rgba(255,215,0,.45);
  animation:winnerPulse 1.6s ease-in-out infinite;
}
@keyframes winnerPulse{
  0%{box-shadow:0 0 18px rgba(255,215,0,.6)}
  50%{box-shadow:0 0 45px rgba(255,215,0,1)}
  100%{box-shadow:0 0 18px rgba(255,215,0,.6)}
}
.scoreCard.bust{
  outline:3px solid rgba(194,70,58,.85);
  background:rgba(194,70,58,.12);
  animation:bustShake .35s ease-in-out 0s 2;
}
@keyframes bustShake{
  0%{transform:translateX(0)} 25%{transform:translateX(-8px)}
  50%{transform:translateX(8px)} 75%{transform:translateX(-6px)} 100%{transform:translateX(0)}
}

/* RIGHT */
.right{ display:grid; grid-template-rows:auto 1fr auto auto; gap:18px; height:100%; }
.turnBox{
  display:flex; justify-content:space-between; padding:16px 24px;
  border-radius:20px; background:rgba(0,0,0,.25); font-weight:700; font-size:1.1rem;
}
.numGrid{ display:grid; grid-template-columns:repeat(5,1fr); gap:14px; align-content:start; }
.numGrid button{
  padding:24px 0; border-radius:20px; font-size:1.6rem; font-weight:1000;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2);
  color:#fff; transition:all .15s; min-height:70px;
}
.numGrid button:active{ transform:scale(.92); background:rgba(255,255,255,.18); }
.numGrid .bull{background:rgba(210,153,34,.45);}
.numGrid .miss{background:rgba(48,54,61,.6);}

.multi{ display:flex; gap:14px; }
.multi button{
  flex:1; padding:22px 18px; border-radius:999px; font-weight:1000;
  border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08);
  color:#fff; transition:all .2s; font-size:1.1rem; min-height:70px;
}
.multi button:active{transform:scale(.95);}
#sBtn{ background:rgba(35,134,54,.22); border-color:rgba(35,134,54,.35); }
#dBtn{ background:rgba(31,111,235,.22); border-color:rgba(31,111,235,.35); }
#tBtn{ background:rgba(194,70,58,.22);  border-color:rgba(194,70,58,.35); }
#sBtn.on{ background:var(--green); border-color:var(--green); box-shadow:0 0 16px rgba(35,134,54,.6); }
#dBtn.on{ background:var(--blue);  border-color:var(--blue);  box-shadow:0 0 16px rgba(31,111,235,.6); }
#tBtn.on{ background:var(--red);   border-color:var(--red);   box-shadow:0 0 16px rgba(194,70,58,.6); }

.actions{ display:flex; gap:16px; justify-content:center; }
.actions button{
  padding:26px 40px; border-radius:999px; font-weight:900;
  border:1px solid rgba(255,255,255,.2); color:#fff;
  min-width:240px; min-height:80px; font-size:1.3rem; transition:all .2s;
}
.actions button:active:not(:disabled){transform:scale(.96);}
.actions .cancel{ background:rgba(255,255,255,.18); }
.actions .next  { background:rgba(31,111,235,.35); }
button:disabled{ opacity:.45; cursor:not-allowed; }

/* =============================
   ド派手オーバーレイ
   ============================= */
.overlay{
  position:fixed; inset:0;
  display:none; align-items:center; justify-content:center;
  z-index:9999;
  pointer-events:none;
}
.overlay.on{ display:flex; }

/* 背景フラッシュ */
.overlay::before{
  content:'';
  position:absolute; inset:0;
  background:rgba(0,0,0,.7);
  animation:bgFade 3s ease forwards;
}
@keyframes bgFade{
  0%{opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{opacity:0}
}

/* カード共通 */
.overlayCard{
  position:relative; z-index:1;
  padding:50px 70px; border-radius:40px;
  text-align:center;
  animation:cardPop .45s cubic-bezier(.17,.67,.35,1.4) forwards;
}
@keyframes cardPop{
  0%{transform:scale(.1) rotate(-8deg);opacity:0}
  70%{transform:scale(1.08) rotate(2deg);opacity:1}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}

/* LOW TON: 炎グラデ */
.overlayCard.lowton{
  background:linear-gradient(135deg,#ff6a00,#ee0979,#ff6a00);
  background-size:200% 200%;
  animation:cardPop .45s cubic-bezier(.17,.67,.35,1.4) forwards,
            fireShift 1s ease-in-out infinite alternate;
  box-shadow:
    0 0 40px rgba(255,106,0,.9),
    0 0 80px rgba(238,9,121,.7),
    0 0 120px rgba(255,106,0,.5);
}
@keyframes fireShift{
  from{background-position:0% 50%} to{background-position:100% 50%}
}

/* NICE ONE: 虹グラデ */
.overlayCard.niceone{
  background:linear-gradient(135deg,#00c9ff,#92fe9d,#fc5c7d,#6a82fb);
  background-size:300% 300%;
  animation:cardPop .45s cubic-bezier(.17,.67,.35,1.4) forwards,
            rainbowShift 1.2s ease-in-out infinite alternate;
  box-shadow:
    0 0 40px rgba(0,201,255,.8),
    0 0 80px rgba(146,254,157,.6),
    0 0 120px rgba(252,92,125,.5);
}
@keyframes rainbowShift{
  0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
}

/* BUST: 赤 */
.overlayCard.bust{
  background:linear-gradient(135deg,#ff3b30,#c2006b);
  box-shadow:0 0 40px rgba(255,59,48,.8),0 0 80px rgba(194,0,107,.6);
}

/* TIMEOUT */
.overlayCard.timeout{
  background:linear-gradient(135deg,#ff6f00,#b00020);
  box-shadow:0 0 40px rgba(255,111,0,.8),0 0 80px rgba(176,0,32,.6);
}

/* テキスト */
.overlayCard .main{
  font-size:5.5rem; font-weight:1000; color:#fff;
  text-shadow:0 0 20px rgba(255,255,255,.8),3px 3px 0 rgba(0,0,0,.4);
  letter-spacing:.04em;
  animation:textGlow 0.8s ease-in-out infinite alternate;
}
@keyframes textGlow{
  from{text-shadow:0 0 15px rgba(255,255,255,.6),3px 3px 0 rgba(0,0,0,.4)}
  to  {text-shadow:0 0 40px rgba(255,255,255,1),0 0 60px rgba(255,255,200,.8),3px 3px 0 rgba(0,0,0,.4)}
}
.overlayCard .sub{
  font-size:1.8rem; font-weight:700;
  color:rgba(255,255,255,.95); margin-top:12px;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
}

/* 紙吹雪キャンバス */
#confettiCanvas{
  position:fixed; inset:0;
  pointer-events:none;
  z-index:9998;
  display:none;
}
#confettiCanvas.on{ display:block; }

/* タブレット小画面 */
@media (max-height:750px){
  .app{gap:14px;} .left{gap:12px;}
  .roundBox{padding:14px 18px;}
  .roundBox .gameNum{font-size:2.4rem;} .roundBox .roundNum{font-size:2.1rem;}
  .scoreCard{padding:16px 14px;}
  .score{font-size:4rem; margin:10px 0 6px;} .score.sm{font-size:3rem;}
  .numGrid button{padding:18px 0; font-size:1.4rem; min-height:58px;}
  .multi button{padding:18px 14px; min-height:58px;}
  .actions button{padding:20px 30px; min-height:66px; font-size:1.15rem;}
  .overlayCard .main{font-size:4rem;}
  .overlayCard .sub{font-size:1.4rem;}
}

/* 縦向き/小画面 */
@media (max-width:750px) or (orientation: portrait){
  body::before{
    content:"このアプリはタブレットを横向きにしてご使用ください";
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    background:var(--bg0); color:var(--txt); font-size:1.5rem; font-weight:700;
    text-align:center; padding:40px; z-index:10000;
  }
  .app{display:none;}
}
</style>

</head>

<body>
<canvas id="confettiCanvas"></canvas>

<div class="app">
  <div class="left">
    <div class="gameRow">
      <button id="game301"  class="on" type="button">301</button>
      <button id="game501"  type="button">501</button>
      <button id="game701"  type="button">701</button>
      <button id="game1101" type="button">1101</button>
      <button id="game1501" type="button">1501</button>
    </div>
    <div class="modeRow">
      <button id="mode1" class="on" type="button">1 PLAYER</button>
      <button id="mode2" type="button">2 PLAYERS</button>
      <button id="reset" class="reset" type="button">RESET</button>
    </div>
    <div class="roundBox">
      <div id="gameLabel" class="gameNum">301</div>
      <div class="roundInfo">
        <div class="roundLabel">ROUND</div>
        <div id="roundDisplay" class="roundNum">1</div>
      </div>
    </div>
    <div class="scoreRow">
      <div id="p1Card" class="scoreCard active">
        PLAYER 1
        <div id="p1Score" class="score">301</div>
        <div id="p1High" class="high">BEST REMAIN : 301</div>
        <div id="p1Checkout" class="checkout"></div>
      </div>
      <div id="p2Card" class="scoreCard">
        PLAYER 2
        <div id="p2Score" class="score">301</div>
        <div id="p2High" class="high">BEST REMAIN : 301</div>
        <div id="p2Checkout" class="checkout"></div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="turnBox">
      <div>THIS TURN</div>
      <div id="hist">— — —</div>
    </div>
    <div class="numGrid" id="numGrid"></div>
    <div class="multi">
      <button id="sBtn" class="on" type="button">SINGLE ×1</button>
      <button id="dBtn" type="button">DOUBLE ×2</button>
      <button id="tBtn" type="button">TRIPLE ×3</button>
    </div>
    <div class="actions">
      <button id="cancelBtn" class="cancel" disabled type="button">CANCEL</button>
      <button id="nextBtn"   class="next"   disabled type="button">NEXT</button>
    </div>
  </div>
</div>

<div id="overlay" class="overlay">
  <div id="overlayCard" class="overlayCard">
    <div id="ovMain" class="main"></div>
    <div id="ovSub"  class="sub"></div>
  </div>
</div>

<script>
(() => {
  // ===== GAME CONFIG =====
  const GAMES = {
    301:  { start:  301, maxRounds: 10 },
    501:  { start:  501, maxRounds: 10 },
    701:  { start:  701, maxRounds: 15 },
    1101: { start: 1101, maxRounds: 20 },
    1501: { start: 1501, maxRounds: 20 },
  };
  const BULL_VALUE = 50;

  // ===== STATE =====
  let startScore   = 301;
  let maxRounds    = 10;
  let mode         = 1;
  let player       = 0;
  let scores       = [startScore, startScore];
  let bestRemain   = [startScore, startScore];
  let currentRound = 1;
  let throwN       = 1;
  let turn         = [null,null,null];
  let pendingBase  = null;
  let locked       = false;
  let snapshot     = null;
  let turnSum      = 0;
  let turnBull     = false;
  let turnLowTon   = false;
  let bustThisTurn = false;
  let turnStartScores = [startScore, startScore];
  let finished     = false;

  const el = id => document.getElementById(id);

  // ===== CONFETTI =====
  const canvas  = el("confettiCanvas");
  const ctx     = canvas.getContext("2d");
  let confetti  = [];
  let confettiRAF = null;

  function launchConfetti(colors){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.classList.add("on");

    confetti = [];
    for(let i = 0; i < 220; i++){
      confetti.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        w: 8 + Math.random() * 14,
        h: 6 + Math.random() * 8,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        vx: (Math.random() - .5) * 5,
        vy: 2 + Math.random() * 5,
        vr: (Math.random() - .5) * .18,
        alpha: 1,
      });
    }

    if(confettiRAF) cancelAnimationFrame(confettiRAF);

    function draw(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      for(const p of confetti){
        p.x  += p.vx;
        p.y  += p.vy;
        p.rot += p.vr;
        if(p.y > canvas.height * .7) p.alpha -= .018;
        if(p.alpha > 0){
          alive = true;
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.ellipse(0, 0, p.w/2, p.h/2, 0, 0, Math.PI*2);
          ctx.fill();
          ctx.restore();
        }
      }
      if(alive) confettiRAF = requestAnimationFrame(draw);
      else stopConfetti();
    }
    draw();
  }

  function stopConfetti(){
    if(confettiRAF){ cancelAnimationFrame(confettiRAF); confettiRAF = null; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.classList.remove("on");
  }

  // ===== OVERLAY =====
  let overlayTimer = null;

  function showOverlay(main, sub='', kind='normal'){
    if(overlayTimer){ clearTimeout(overlayTimer); overlayTimer = null; }
    stopConfetti();

    el("ovMain").textContent = main;
    el("ovSub").textContent  = sub;

    const card = el("overlayCard");
    card.className = 'overlayCard ' + kind;

    // 再アニメのため一度外して付け直す
    card.style.animation = 'none';
    card.offsetHeight; // reflow
    card.style.animation = '';

    el("overlay").classList.add("on");

    // 紙吹雪
    if(kind === 'lowton'){
      launchConfetti(['#ff6a00','#ee0979','#ff4500','#ffd700','#ff1493']);
    } else if(kind === 'niceone'){
      launchConfetti(['#00c9ff','#92fe9d','#fc5c7d','#6a82fb','#ffd700','#fff']);
    } else if(kind === 'winner' || kind === 'finish'){
      launchConfetti(['#ffd700','#fff','#ff69b4','#00bfff','#7fff00','#ff4500']);
    }

    overlayTimer = setTimeout(() => {
      el("overlay").classList.remove("on");
      stopConfetti();
    }, 3000);
  }

  // ===== CHECKOUT HINT (整数のみ) =====
  function allScoreValues(){
    const s = new Set();
    for(let i=1;i<=20;i++){ s.add(i); s.add(i*2); s.add(i*3); }
    s.add(BULL_VALUE);
    return [...s].sort((a,b)=>a-b);
  }
  function scoreLabel(v){
    if(v===BULL_VALUE) return 'BULL';
    if(v>20 && v%3===0 && v/3<=20) return `T${v/3}`;
    if(v>20 && v%2===0 && v/2<=20) return `D${v/2}`;
    return `${v}`;
  }
  function checkoutIn1(r){
    if(r<1||r>60) return null;
    if(r<=20) return `${r}`;
    if(r%2===0&&r/2<=20) return `D${r/2}`;
    if(r%3===0&&r/3<=20) return `T${r/3}`;
    if(r===50) return 'BULL';
    return null;
  }
  function checkoutIn2(r){
    if(r<2||r>110) return null;
    for(const a of allScoreValues()){
      const b=r-a; if(b<1) continue;
      const f=checkoutIn1(b); if(f) return `${scoreLabel(a)} → ${f}`;
    }
    return null;
  }
  function checkoutIn3(r){
    if(r<3||r>170) return null;
    for(const a of allScoreValues()){
      const rest=r-a; if(rest<2) continue;
      const r2=checkoutIn2(rest); if(r2) return `${scoreLabel(a)} → ${r2}`;
    }
    return null;
  }
  function getCheckoutHint(remain){
    if(remain<=0||remain>170) return '';
    const r1=checkoutIn1(remain); if(r1) return `🎯 ${r1}`;
    const r2=checkoutIn2(remain); if(r2) return `🎯 ${r2}`;
    const r3=checkoutIn3(remain); if(r3) return `🎯 ${r3}`;
    return '';
  }

  // ===== HELPERS =====
  function clearWinnerGlow(){ el("p1Card").classList.remove("winner"); el("p2Card").classList.remove("winner"); }
  function clearBustGlow()  { el("p1Card").classList.remove("bust");   el("p2Card").classList.remove("bust");   }

  function takeSnapshotIfNeeded(){
    if(!snapshot){
      snapshot={
        scores:[...scores],bestRemain:[...bestRemain],
        player,throwN,turn:[...turn],pendingBase,locked,
        turnSum,turnBull,turnLowTon,bustThisTurn,finished,
        turnStartScores:[...turnStartScores],
        startScore,maxRounds,mode,currentRound
      };
    }
  }

  function restoreTurn(){
    if(!snapshot) return;
    scores=          [...snapshot.scores];
    bestRemain=      [...snapshot.bestRemain];
    player=          snapshot.player;
    throwN=          snapshot.throwN;
    turn=            [...snapshot.turn];
    pendingBase=     null;
    locked=          snapshot.locked;
    turnSum=         snapshot.turnSum;
    turnBull=        snapshot.turnBull;
    turnLowTon=      snapshot.turnLowTon;
    bustThisTurn=    snapshot.bustThisTurn;
    finished=        snapshot.finished;
    turnStartScores= [...snapshot.turnStartScores];
    startScore=      snapshot.startScore;
    maxRounds=       snapshot.maxRounds;
    mode=            snapshot.mode;
    currentRound=    snapshot.currentRound;
    snapshot=null;
    el("cancelBtn").disabled=true;
    el("nextBtn").disabled=true;
    el("nextBtn").textContent="NEXT";
    clearWinnerGlow(); clearBustGlow();
    setMultiUI("sBtn"); update();
  }

  function setTurnStartSnapshot(){ turnStartScores=[...scores]; }
  function setMultiUI(onId){ ["sBtn","dBtn","tBtn"].forEach(id=>el(id).classList.toggle("on",id===onId)); }

  // ===== ROUND LIMIT END =====
  function roundLimitEnd(){
    finished=true;
    clearWinnerGlow(); clearBustGlow();
    if(mode===2){
      if(scores[0]<scores[1]){
        el("p1Card").classList.add("winner");
        showOverlay("PLAYER 1 WIN!",`REMAIN  ${scores[0]} vs ${scores[1]}`,"timeout");
      } else if(scores[1]<scores[0]){
        el("p2Card").classList.add("winner");
        showOverlay("PLAYER 2 WIN!",`REMAIN  ${scores[1]} vs ${scores[0]}`,"timeout");
      } else {
        el("p1Card").classList.add("winner"); el("p2Card").classList.add("winner");
        showOverlay("DRAW!",`REMAIN  ${scores[0]} vs ${scores[1]}`,"timeout");
      }
    } else {
      el("p1Card").classList.add("winner");
      showOverlay("TIME OUT!",`REMAIN : ${scores[0]}`,"timeout");
    }
    el("nextBtn").disabled=false; el("nextBtn").textContent="NEXT GAME";
    el("cancelBtn").disabled=true;
  }

  // ===== FINISH =====
  function finishGame(){
    finished=true;
    clearWinnerGlow(); clearBustGlow();
    if(mode===2){
      const winner=player;
      el(winner===0?"p1Card":"p2Card").classList.add("winner");
      showOverlay(`PLAYER ${winner+1} WINNER!`,'','winner');
    } else {
      el("p1Card").classList.add("winner");
      showOverlay("FINISH!",'',"finish");
    }
    el("nextBtn").disabled=false; el("nextBtn").textContent="NEXT GAME";
    el("cancelBtn").disabled=true;
  }

  // ===== START NEXT =====
  function startNextGame(){
    const cfg=GAMES[startScore];
    maxRounds= cfg ? cfg.maxRounds : null;
    scores=[startScore,startScore]; bestRemain=[startScore,startScore];
    player=0; throwN=1; turn=[null,null,null]; pendingBase=null;
    locked=false; snapshot=null;
    turnSum=0; turnBull=false; turnLowTon=false; bustThisTurn=false;
    finished=false; currentRound=1;
    clearWinnerGlow(); clearBustGlow();
    setTurnStartSnapshot();
    el("nextBtn").textContent="NEXT"; el("nextBtn").disabled=true;
    el("cancelBtn").disabled=true;
    setMultiUI("sBtn"); update();
  }

  // ===== END TURN =====
  function endTurn(auto=false){
    if(finished){ startNextGame(); return; }
    if(!locked && !auto) return;

    if(!bustThisTurn){
      if(turnLowTon)  showOverlay("🔥 LOW TON!! 🔥", `${turnSum} pts !`, "lowton");
      else if(turnBull) showOverlay("⭐ NICE ONE!! ⭐", "BULL IN !", "niceone");
    }

    snapshot=null; pendingBase=null; locked=false;
    throwN=1; turn=[null,null,null];
    turnSum=0; turnBull=false; turnLowTon=false; bustThisTurn=false;
    clearBustGlow();
    el("cancelBtn").disabled=true; el("nextBtn").disabled=true;

    let roundComplete=false;
    if(mode===1){ currentRound++; roundComplete=true; }
    else { if(player===1){ currentRound++; roundComplete=true; } player^=1; }

    if(roundComplete && maxRounds!==null && currentRound>maxRounds){
      setTurnStartSnapshot(); setMultiUI("sBtn"); update();
      roundLimitEnd(); return;
    }
    setTurnStartSnapshot(); setMultiUI("sBtn"); update();
  }

  function nextTurn(){ endTurn(false); }

  // ===== BUST =====
  function bustNow(){
    scores[player]=turnStartScores[player];
    bustThisTurn=true;
    clearBustGlow();
    el(player===0?"p1Card":"p2Card").classList.add("bust");
    showOverlay(`💥 BUST!! 💥`,`PLAYER ${player+1}`,"bust");
    locked=true; pendingBase=null;
    turn=["BUST",null,null]; throwN=4;
    el("cancelBtn").disabled=true; el("nextBtn").disabled=true;
    update();
    setTimeout(()=>{ if(!finished){ endTurn(true); } },900);
  }

  // ===== APPLY SCORE =====
  function applyScore(val){
    const nextRemain=scores[player]-val;
    if(nextRemain<0){ bustNow(); return; }
    scores[player]=nextRemain;
    bestRemain[player]=Math.min(bestRemain[player],scores[player]);
    turn[throwN-1]=val; throwN++;
    turnSum+=val;
    if(val===BULL_VALUE) turnBull=true;
    if(turnSum>100) turnLowTon=true;
    pendingBase=null; el("cancelBtn").disabled=false;
    if(scores[player]===0){ locked=true; el("nextBtn").disabled=false; update(); finishGame(); return; }
    if(throwN>3){ locked=true; el("nextBtn").disabled=false; }
    setMultiUI("sBtn"); update();
  }

  function pickNumber(base,kind){
    if(finished||locked) return;
    takeSnapshotIfNeeded();
    if(kind==="BULL"){ applyScore(BULL_VALUE); return; }
    if(kind==="MISS"){ applyScore(0); return; }
    pendingBase=base; el("cancelBtn").disabled=false;
  }

  function applyMultiplier(m){
    if(finished||locked||pendingBase==null) return;
    applyScore(pendingBase*m);
  }

  function setMode(m){ mode=m; player=0; clearWinnerGlow(); clearBustGlow(); startNextGame(); }

  function setGame(score){
    startScore=score;
    el("gameLabel").textContent=String(score);
    Object.keys(GAMES).forEach(k=>{ const b=el(`game${k}`); if(b) b.classList.toggle("on",Number(k)===score); });
    startNextGame();
  }

  function formatTurnCell(v){ return v==="BUST"?"BUST":(v??"—"); }

  function update(){
    el("p1Score").textContent=scores[0]; el("p2Score").textContent=scores[1];
    el("p1Score").className="score"+(scores[0]>=1000?" sm":"");
    el("p2Score").className="score"+(scores[1]>=1000?" sm":"");
    el("p1High").textContent=`BEST REMAIN : ${bestRemain[0]}`;
    el("p2High").textContent=`BEST REMAIN : ${bestRemain[1]}`;
    el("hist").textContent=turn.map(formatTurnCell).join("  ");
    el("p1Card").classList.toggle("active",player===0);
    el("p2Card").classList.toggle("active",player===1&&mode===2);
    el("mode1").classList.toggle("on",mode===1);
    el("mode2").classList.toggle("on",mode===2);
    el("p1Checkout").textContent=getCheckoutHint(scores[0]);
    el("p2Checkout").textContent=getCheckoutHint(scores[1]);
    const rdEl=el("roundDisplay");
    if(maxRounds===null){
      rdEl.textContent=`${currentRound}`; rdEl.className="roundNum";
    } else {
      const rem=maxRounds-currentRound+1;
      rdEl.textContent=`${currentRound} / ${maxRounds}`;
      rdEl.className="roundNum"+(rem<=3?" danger":rem<=6?" warn":"");
    }
  }

  // ===== BUILD NUMBER GRID =====
  const g=el("numGrid");
  for(let i=1;i<=20;i++){
    const b=document.createElement("button");
    b.type="button"; b.textContent=i;
    b.onclick=()=>pickNumber(i,"NUM"); g.appendChild(b);
  }
  const miss=document.createElement("button");
  miss.type="button"; miss.textContent="MISS"; miss.className="miss";
  miss.onclick=()=>pickNumber(0,"MISS"); g.appendChild(miss);
  const bull=document.createElement("button");
  bull.type="button"; bull.textContent="BULL"; bull.className="bull";
  bull.onclick=()=>pickNumber(BULL_VALUE,"BULL"); g.appendChild(bull);

  // ===== WIRE =====
  el("sBtn").onclick=()=>{ setMultiUI("sBtn"); applyMultiplier(1); };
  el("dBtn").onclick=()=>{ setMultiUI("dBtn"); applyMultiplier(2); };
  el("tBtn").onclick=()=>{ setMultiUI("tBtn"); applyMultiplier(3); };
  el("cancelBtn").onclick=restoreTurn;
  el("nextBtn").onclick=nextTurn;
  el("mode1").onclick=()=>setMode(1); el("mode2").onclick=()=>setMode(2);
  Object.keys(GAMES).forEach(k=>{ const b=el(`game${k}`); if(b) b.onclick=()=>setGame(Number(k)); });
  el("reset").onclick=()=>location.reload();

  // ===== INIT =====
  setGame(301); setMultiUI("sBtn");
})();
</script>

</body>
</html>
